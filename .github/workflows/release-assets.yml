name: Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows artifacts
            build_command: npm run dist:win
            files: |
              dist/MediaScribe-Portable.exe
              dist/MediaScribe-Setup.exe
              dist/MediaScribe-Setup.exe.blockmap
          - os: macos-latest
            label: macOS artifacts
            build_command: npm run dist:mac
            files: |
              dist/MediaScribe-macOS-*.dmg
              dist/MediaScribe-macOS-*.zip
          - os: ubuntu-latest
            label: Linux artifacts
            build_command: npm run dist:linux
            files: |
              dist/MediaScribe-linux-*.AppImage
              dist/MediaScribe-linux-*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release assets
        run: ${{ matrix.build_command }}

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ matrix.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
